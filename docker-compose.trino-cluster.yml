# Fuqing CRM Trino cluster POC (跟 Sprint N+3 W5-6 1:1 stable 沿用).
# 跟 Sprint N+2 single-node 1:1 stable 沿用 + 3 worker cluster 横向扩展 POC.
# 跟 L4.7 + L4.36 + L4.38 + L4.60 + L4.62 永久规则 1:1 stable 沿用.
# 启动: docker compose -f docker-compose.trino-cluster.yml up -d
# 跑 benchmark: PYTHONPATH="$(pwd)" python3 scripts/trino_poc/benchmark.py --engine trino --runs 10 --warmup 1 --trino-url http://127.0.0.1:18080

name: fuqing-trino-cluster-poc

services:
  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${FQ_TRINO_MINIO_PORT:-19000}:9000"
      - "${FQ_TRINO_MINIO_CONSOLE_PORT:-19001}:9001"
    environment:
      MINIO_ROOT_USER: ${FQ_TRINO_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${FQ_TRINO_S3_SECRET_KEY:-minioadmin}
    volumes:
      - trino-minio-data:/data

  hive-metastore-db:
    image: ${HIVE_METASTORE_DB_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - trino-hive-metastore-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 12

  hive-metastore:
    image: ${HIVE_IMAGE:-apache/hive:4.0.1}
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-metastore-db:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
        -Dhive.metastore.warehouse.dir=s3a://fuqing-crm-poc/warehouse
        -Dfs.s3a.endpoint=http://minio:9000
        -Dfs.s3a.access.key=${FQ_TRINO_S3_ACCESS_KEY:-minioadmin}
        -Dfs.s3a.secret.key=${FQ_TRINO_S3_SECRET_KEY:-minioadmin}
        -Dfs.s3a.path.style.access=true
        -Dfs.s3a.connection.ssl.enabled=false
    ports:
      - "${FQ_TRINO_HMS_PORT:-19083}:9083"

  trino-coordinator:
    image: ${TRINO_IMAGE:-trinodb/trino:latest}
    depends_on:
      hive-metastore:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "${FQ_TRINO_COORDINATOR_PORT:-18080}:8080"
    environment:
      AWS_ACCESS_KEY_ID: ${FQ_TRINO_S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${FQ_TRINO_S3_SECRET_KEY:-minioadmin}
      AWS_REGION: ${FQ_TRINO_S3_REGION:-us-east-1}
    volumes:
      - ./trino-coordinator:/etc/trino:ro
      - trino-coordinator-data:/var/trino/data

  # Sprint N+3 cluster 3 worker (跟 Sprint N+2 1 worker 1:1 stable 扩展, 横向扩展 POC)
  # 跟 L4.7 launchd 首选 python3 1:1 stable 沿用 (跟 launchctl 启动器不冲突)
  trino-worker-1:
    image: ${TRINO_IMAGE:-trinodb/trino:latest}
    depends_on:
      trino-coordinator:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: ${FQ_TRINO_S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${FQ_TRINO_S3_SECRET_KEY:-minioadmin}
      AWS_REGION: ${FQ_TRINO_S3_REGION:-us-east-1}
    volumes:
      - ./trino-worker:/etc/trino:ro
      - trino-worker-data-1:/var/trino/data

  trino-worker-2:
    image: ${TRINO_IMAGE:-trinodb/trino:latest}
    depends_on:
      trino-coordinator:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: ${FQ_TRINO_S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${FQ_TRINO_S3_SECRET_KEY:-minioadmin}
      AWS_REGION: ${FQ_TRINO_S3_REGION:-us-east-1}
    volumes:
      - ./trino-worker:/etc/trino:ro
      - trino-worker-data-2:/var/trino/data

  trino-worker-3:
    image: ${TRINO_IMAGE:-trinodb/trino:latest}
    depends_on:
      trino-coordinator:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: ${FQ_TRINO_S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${FQ_TRINO_S3_SECRET_KEY:-minioadmin}
      AWS_REGION: ${FQ_TRINO_S3_REGION:-us-east-1}
    volumes:
      - ./trino-worker:/etc/trino:ro
      - trino-worker-data-3:/var/trino/data

volumes:
  trino-minio-data:
  trino-hive-metastore-db:
  trino-coordinator-data:
  trino-worker-data-1:
  trino-worker-data-2:
  trino-worker-data-3:
