services:
  postgresql16:
    image: postgres:16
    container_name: fuqing-postgresql16-single
    environment:
      POSTGRES_DB: fuqing_crm
      POSTGRES_USER: fuqing
      POSTGRES_PASSWORD: fuqing_dev_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgresql16_single_data:/var/lib/postgresql/data
      - ./scripts/postgresql16_udf:/docker-entrypoint-initdb.d:ro
      - ./data/processed/postgresql16_parquet:/var/lib/fuqing/parquet:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuqing -d fuqing_crm"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=4GB"
      - "-c"
      - "work_mem=128MB"
      - "-c"
      - "max_connections=200"

volumes:
  postgresql16_single_data:
