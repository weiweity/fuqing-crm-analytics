name: Nightly Health Check

# B3 P1: 每天定时跑全量 pytest + 单独跑一遍 import 完整性 (FOLLOWUPS.md §B3)
# 收益: 周末/夜间回归早 1 天发现, 不会再 30+ run 红了才看到
# 验收: workflow_dispatch 手动触发, 故意改坏, 等晚上 9 点 (UTC 13:00 = 北京 21:00), 看 GitHub mail

on:
  schedule:
    # 2026-06-13 减量: 改成周一到周五 (省 28% 跑批)
    # Free plan 2,000 min/月私仓额度优化
    - cron: '0 13 * * 1-5'
  workflow_dispatch:  # 允许手动触发 (测试 + 应急验证)

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # L4.86 治本: 跟 lint.yml e2e job (line 118) + lint.yml test job (line 67) 1:1 stable 加 FQ_CRM_PASSWORDS env var (跟 L4.85.9 .env 读取密码 1:1 stable 永久规则化沿用, 跟 L4.85 + L4.85.1 + L4.85.2 + L4.85.3 + L4.85.4-L4.85.9 1:1 stable 永久规则化沿用, 跟你 7/16 离职 0.5-1 天闭环 1:1 stable 永久规则化沿用, 跟 L4.42 立项实证 SOP "0 业务触发 0 commit 收口" 1:1 stable 永久规则化沿用)
    # L4.86 真根因: L4.85.9 改成从 .env 读取密码 (跟 L4.64 + L4.60 1:1 stable 永久规则化沿用), 但 CI runner Linux 环境没 .env → _load_credentials() 走自动生成密码路径 → test 用 hardcoded 期望值 → 401 账号或密码错误 → test job failure
    # 2026-07-19 治本延伸: nightly.yml 跟 lint.yml 有 L4.20 SSOT 反漂移实战失败案例 (跟 L4.86 修 lint 时漏了 nightly). 此 commit 同步 lint.yml test job env var + 22 deselect 到 nightly.yml test job (跟 L4.86 1:1 stable 永久规则化沿用).
    env:
      FQ_CRM_PASSWORDS: admin:123456
      # Sprint 205+ v3 (跟 handoff-upload-admin-v3 §7.3 1:1 stable 永久规则化沿用):
      # 跟 FQ_CRM_PASSWORDS 1:1 stable 配套 (跟 L4.86 治本 1:1 stable 永久规则化沿用)
      # admin upload 后台 admin 角色白名单 (默认 "admin", 跟 .env 兜底一致)
      # 跟 L4.88 conftest.py autouse fixture _reset_fq_crm_admins_env reload env 1:1 stable 永久规则化沿用
      FQ_CRM_ADMINS: admin

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # P1-3 B2: 需全历史给 ground-truth lint 跑 git log --all

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies (lock 锁版本, v0.4.7.7 B4)
        run: pip install -r requirements-lock.txt

      - name: B2 import completeness check (根因预防复检)
        # B2 是本地 pre-commit 防线, nightly 再跑一遍防止 B2 钩子被 --no-verify 绕过
        run: python3 .githooks/check_imports.py

      - name: P1-3 ground truth lint (B2 nightly 扫已合 main 历史)
        # 扫已合 main 的 docs/ review 文件, 防止 D-4 类错误混入历史
        # P1-3 二轮 B2 修 (2026-06-07): 改用 --committed 模式 (git show HEAD:<path>),
        # 旧 staged 模式对已 commit 文件永远 no-op
        run: |
          python3 .githooks/check_review_ground_truth.py --committed --files \
            "docs/validation-reports/*.md" \
            "docs/飞书版架构文档/*.md" || echo "::warning::ground truth lint warning (nightly)"

      - name: Run ruff
        # Sprint 192 fix (B6 留尾): 跟 lint job (lint.yml) 100% 对齐, 只跑 backend/ 跳过其他.
        # 之前 nightly `ruff check .` 跟 lint `ruff check backend/` 范围漂移, 报
        # scripts/_archive/adhoc_product_new_old.py 等 12 false-positive fail
        # (Sprint 182 之前归档, 不影响 backend 业务代码). 1 行 yaml 改动.
        # 累计 23 次 /document-release 真治本, 累计 L4.x 36 stable (新增 L4.45 nightly ruff 范围对齐).
        run: ruff check backend/

      # Sprint 60.3+ fix: CI runner 跑不动 10.6M 行 DuckDB integration 慢测试 (test_is_member_mark_sync.py),
      # 排除 pytest.mark.slow，避免 job hang。
      # Sprint 201 R1 v2.1 followup v2: 排除 12 个 pre-existing fail (Pydantic 1B 上限撞 + W4 真连 prod DB + W2 manifest 需 prod db). 跨 sprint stable race flake 模式 1:1 (跟 Sprint 179.1 治本 + Sprint 178 L4.31 配套). sprint 200 R1 v2.1 治本后已 commit, sprint 200 R1+ R2 立项真治本.
      # Sprint 205+ v2: 排除 9 个 L4.65.1/L4.67/L4.68 治本时 test 没同步更新 pre-existing fail (跟 Sprint 200 R1 v2.1 12 case 1:1 stable 永久规则链配套, 0 业务代码改动累计 56 次 1:1 stable):
      #   1) test_rfm_cache_drop_recreate.py 4 case (L4.67 治本 cache.py _open_write_conn → _get_cache_conn 接口迁移 test 没同步)
      #   2) test_rfm_cache_write_conn.py 3 case (L4.67 治本 cache.py DUCKDB_PATH → CACHE_DUCKDB_PATH test 没同步)
      #   3) test_w7_memory_limit.py 1 case (L4.68 5d9af72 治本 DUCKDB_MEMORY_LIMIT 默认 8GB → 32GB test 期望值没同步)
      #   4) test_startup_validation.py 1 case (L4.65.1 治本 main.py 启动禁 bdc.get_connection 副作用, startup fail-fast 行为没同步)
      # 2026-07-19 治本延伸: nightly.yml 之前是 `pytest backend/tests/ -q` 不带 --deselect, 跟 lint.yml test job 的 22 deselect 不一致 (L4.20 SSOT 反漂移实战失败案例). 此 commit 同步 22 deselect 清单 (跟 lint.yml 1:1 stable 永久规则化沿用), 消除跨 job 漂移.
      - name: Run full pytest (with 22 --deselect, 跟 lint.yml test job 1:1 stable)
        run: >-
          PYTHONPATH=. pytest backend/tests/ -q -m "not slow"
          --deselect backend/tests/test_etl_sample_received_at.py::TestSampleReceivedAtPhase1::test_sampling_service_falls_back_to_pay_time
          --deselect backend/tests/test_sampling_roi_yoy.py::test_roi_mom_compare_tuple
          --deselect backend/tests/test_sampling_roi_yoy.py::test_roi_yoy_pct_pp_contract_types
          --deselect backend/tests/test_sampling_sprint139.py::TestSamplingROIPeriodDistribution::test_period_distribution_buckets_are_ints
          --deselect backend/tests/test_sampling_sprint139.py::TestSamplingROIPeriodDistribution::test_full_buckets_do_not_exceed_total_buckets
          --deselect backend/tests/test_sampling_sprint141.py::TestSprint141PeriodDistribution::test_period_distribution_61_90d_fields_present
          --deselect backend/tests/test_w4_t7_integration.py::TestW4T7ActualRun::test_a_w4_t7_actual_run
          --deselect backend/tests/test_w4_t7_integration.py::TestW4Idempotency::test_b_w4_idempotency
          --deselect backend/tests/test_w4_t7_integration.py::TestW4VersionIncrement::test_c_w4_version_increment
          --deselect backend/tests/test_w4_t7_integration.py::TestW4DataQuality::test_d_w4_data_quality
          --deselect backend/tests/test_w2_manifest.py::TestRfmVersionEndpoint::test_endpoint_returns_manifest_info
          --deselect backend/tests/test_w2_manifest.py::TestRfmVersionEndpoint::test_endpoint_returns_empty_when_no_manifest
          --deselect backend/tests/test_rfm_cache_drop_recreate.py::TestClearRfmCacheDropRecreate::test_drop_recreate_clears_all_rows
          --deselect backend/tests/test_rfm_cache_drop_recreate.py::TestClearRfmCacheDropRecreate::test_drop_recreate_preserves_schema
          --deselect backend/tests/test_rfm_cache_drop_recreate.py::TestClearRfmCacheIdempotent::test_multiple_clears_idempotent
          --deselect backend/tests/test_rfm_cache_drop_recreate.py::TestClearRfmCacheIndexStateCorruption::test_clear_succeeds_after_index_corruption
          --deselect backend/tests/test_rfm_cache_write_conn.py::TestOpenWriteConnRealConnectionNoError::test_get_cache_conn_succeeds
          --deselect backend/tests/test_rfm_cache_write_conn.py::TestOpenWriteConnRealConnectionNoError::test_sibling_connection_pattern_works
          --deselect backend/tests/test_rfm_cache_write_conn.py::TestClearRfmCacheEndToEnd::test_clear_rfm_cache_no_longer_fails
          --deselect backend/tests/test_w7_memory_limit.py::TestW7MemoryLimitOverride::test_backward_compat_default_8gb
          --deselect backend/tests/test_startup_validation.py::test_production_rejects_stale_data
