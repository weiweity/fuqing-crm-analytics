name: CI

# 2026-06-13 减量: 加 paths 过滤, docs 提交不触发 CI (6/12 一次性 docs push 就用掉 50+ min)
# Free plan 2,000 min/月 私仓额度用完后 CI 立即 fail, 此过滤可省 ~80% 用量
# Sprint 41 (2026-06-19): 加 frontend-vue3/e2e/** + playwright.config.ts 触发 e2e job
# Sprint 83 (2026-06-23): 加 CLAUDE.md + docs/maintenance/** + docs/operating/** + docs/business/** + memory/** 触发 CI (L4.16 永久规则沉淀, Sprint 82 真因发现: 之前 paths 不含 CLAUDE.md → Sprint 77 push L4.15 永久规则 0 CI run 跑, 跨 sprint 4 sprint 滞后异常 stable 模式真因 = workflow paths 限制)
# Sprint 85 (2026-06-23): Node 20 → Node 24 升级 (L4.17 永久规则沉淀, Sprint 84 CI annotations 实战). ruff-action@v3 → v3.6.1 锁 stable (Sprint 63 P2 教训: v4 pre-release GH Actions git ref 解析失败, L4.9 永久规则 gh api tags 验证) + setup-node@v5 强制 Node 24 (覆盖 ruff-action 内部 Node 20)
# Sprint 87 (2026-06-23): ruff-action 替代 (L4.17 SOP 修复彻底, Sprint 86 annotation 警告仍存在真因修复). 移除 astral-sh/ruff-action@v3.6.1 (内部 Node 20 检测**无法通过** setup-node 覆盖) + 移除 setup-node@v5 (Sprint 85 修但没覆盖 action 内部 Node) + 改用 setup-python@v6 + pip install ruff==0.4.10 (L4.9 永久规则 锁 ruff version, Sprint 92 必修 2 真因修) + ruff check backend/ 自定义 step (避免 ruff-action 内部 Node 20, L4.17 SOP 修复彻底 annotation 警告 0 触发). 失去 ruff-action cache 优化但 backend/ 改动频率低, 缓存影响小.
# Sprint 123 (2026-06-25): 曾把 e2e 并进本文件作第 4 job；2026-07-19 门禁分层：PR/main 默认不再跑浏览器 e2e（假红 + 15–25min 环境税）。
# 可选极简 UI smoke → .github/workflows/e2e-smoke.yml（workflow_dispatch + nightly schedule，不挡 PR merge）。
# Sprint 129 (2026-06-27): paths 仍含 frontend-vue3/e2e/** — e2e 源码变更仍触发 lint+test（非 Playwright）。
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'frontend-vue3/src/**'
      - 'frontend-vue3/e2e/**'
      - 'frontend-vue3/playwright.config.ts'
      - 'requirements.txt'
      - 'requirements-lock.txt'
      - 'requirements-e2e.txt'
      - 'pyproject.toml'
      - '.githooks/**'
      - '.github/workflows/**'
      - 'CLAUDE.md'
      - 'docs/maintenance/**'
      - 'docs/operating/**'
      - 'docs/business/**'
      - '~/.claude/projects/**/memory/**'
      - 'docs/validation-reports/**'
      - 'docs/飞书版架构文档/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: 'pip'  # Sprint 87 - pip cache 替代 ruff-action cache
          cache-dependency-path: requirements-lock.txt
      - name: "Install ruff (L4.41 + L4.9 lock version 1:1 with requirements-lock.txt)"
        run: pip install -r requirements-lock.txt
      - name: "Print python + ruff versions (Track A 2026-07-19)"
        run: |
          python --version
          ruff --version
      - name: "Run ruff check (Sprint 87 custom step, avoid ruff-action internal Node 20)"
        run: ruff check backend/

  ground-truth-lint:
    runs-on: ubuntu-latest
    # P1-3 B2 (2026-06-06): 镜像本地 pre-commit 钩子, 防止 agent 走 PR 漏判 ground-truth 错误
    # 教训 D-4 (2026-06-06): 飞书架构 7 份刷出现 4 个未附 git log 实证的 ground-truth 声明
    # P1-3 二轮 B2 修 (2026-06-07): 改用 --committed 模式, 跑 git show HEAD:<path>
    # 拉已 commit 文件内容 (旧 staged 模式对已 commit 文件永远 no-op)
    # 非阻塞起步 (|| echo warning), 观察 false positive 率后再考虑改 blocking
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 需全历史给 ground-truth lint 跑 git log --all
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Ground truth lint (B2 P1-3 + 二轮 B2 committed 模式)
        run: |
          python3 .githooks/check_review_ground_truth.py --committed --files \
            "docs/validation-reports/*.md" \
            "docs/飞书版架构文档/*.md" || echo "::warning::ground truth lint warning (non-blocking for now)"

  test:
    runs-on: ubuntu-latest
    # L4.86 治本: 跟 e2e job (line 118) 1:1 stable 加 FQ_CRM_PASSWORDS env var (跟 L4.85.9 .env 读取密码 1:1 stable 永久规则化沿用, 跟 L4.85 + L4.85.1 + L4.85.2 + L4.85.3 + L4.85.4-L4.85.9 1:1 stable 永久规则化沿用, 跟之前 1:1 stable 永久规则链配套, 跟 user 7/10 拍板 1:1 stable 配套, 跟你 7/16 离职 0.5-1 天闭环 1:1 stable 永久规则化沿用, 跟 L4.42 立项实证 SOP "0 业务触发 0 commit 收口" 1:1 stable 永久规则化沿用)
    # L4.86 真根因: L4.85.9 改成从 .env 读取密码 (跟 L4.64 + L4.60 1:1 stable 永久规则化沿用), 但 CI runner Linux 环境没 .env → _load_credentials() 走自动生成密码路径 → test 用 hardcoded 期望值 → 401 账号或密码错误 → test job failure
    env:
      FQ_CRM_PASSWORDS: admin:123456
      # Sprint 205+ v3 (跟 handoff-upload-admin-v3 §7.3 1:1 stable 永久规则化沿用):
      # 跟 FQ_CRM_PASSWORDS 1:1 stable 配套 (跟 L4.86 治本 1:1 stable 永久规则化沿用)
      # admin upload 后台 admin 角色白名单 (默认 "admin", 跟 .env 兜底一致)
      # 跟 L4.88 conftest.py autouse fixture _reset_fq_crm_admins_env reload env 1:1 stable 永久规则化沿用
      FQ_CRM_ADMINS: admin
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: 'pip'
      - run: pip install -r requirements-lock.txt
      # Sprint 60.3+ fix: CI runner 跑不动 10.6M 行 DuckDB integration 慢测试 (test_is_member_mark_sync.py),
      # 排除 pytest.mark.slow，避免 job hang。
      # Sprint C 2026-07-19: C-class 7 deselect only (A1/A2 restored, B dead nodeids cleared).
      # Track A 2026-07-19: deselect SSOT = scripts/ci/pytest_c_class_deselects.txt
      #   (shared by pre-push + lint.yml + nightly.yml — no more hardcoded drift)
      - name: Run full pytest (C-class deselect SSOT)
        run: |
          set -euo pipefail
          DESELECT_ARGS=()
          while IFS= read -r tok; do
            [ -n "$tok" ] && DESELECT_ARGS+=("$tok")
          done < <(bash scripts/ci/pytest_deselect_args.sh)
          echo "C-class deselect count: $((${#DESELECT_ARGS[@]} / 2))"
          PYTHONPATH=. pytest backend/tests/ -q -m "not slow" "${DESELECT_ARGS[@]}"

