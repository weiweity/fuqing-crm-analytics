name: CI

# 2026-06-13 减量: 加 paths 过滤, docs 提交不触发 CI (6/12 一次性 docs push 就用掉 50+ min)
# Free plan 2,000 min/月 私仓额度用完后 CI 立即 fail, 此过滤可省 ~80% 用量
# Sprint 41 (2026-06-19): 加 frontend-vue3/e2e/** + playwright.config.ts 触发 e2e job
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'frontend-vue3/src/**'
      - 'frontend-vue3/e2e/**'
      - 'frontend-vue3/playwright.config.ts'
      - 'requirements.txt'
      - 'requirements-lock.txt'
      - 'pyproject.toml'
      - '.githooks/**'
      - '.github/workflows/**'
      - 'docs/validation-reports/**'
      - 'docs/飞书版架构文档/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3

  ground-truth-lint:
    runs-on: ubuntu-latest
    # P1-3 B2 (2026-06-06): 镜像本地 pre-commit 钩子, 防止 agent 走 PR 漏判 ground-truth 错误
    # 教训 D-4 (2026-06-06): 飞书架构 7 份刷出现 4 个未附 git log 实证的 ground-truth 声明
    # P1-3 二轮 B2 修 (2026-06-07): 改用 --committed 模式, 跑 git show HEAD:<path>
    # 拉已 commit 文件内容 (旧 staged 模式对已 commit 文件永远 no-op)
    # 非阻塞起步 (|| echo warning), 观察 false positive 率后再考虑改 blocking
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需全历史给 ground-truth lint 跑 git log --all
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Ground truth lint (B2 P1-3 + 二轮 B2 committed 模式)
        run: |
          python3 .githooks/check_review_ground_truth.py --committed --files \
            "docs/validation-reports/*.md" \
            "docs/飞书版架构文档/*.md" || echo "::warning::ground truth lint warning (non-blocking for now)"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - run: pip install -r requirements-lock.txt
      - run: PYTHONPATH=. pytest backend/tests/ -x -q

  # Sprint 41: GH Actions 跑 e2e (Sprint 32.1 留尾, Sprint 40 audit 后实施)
  # Sprint 60.3+ C+: CI runner 无 production DuckDB，用 scripts/ci/e2e_schema.sql 初始化空 schema，
  # e2e 恢复 blocking，同时保留 auth/health 真实后端健康检查。
  e2e:
    runs-on: ubuntu-latest
    env:
      DUCKDB_PATH: /tmp/e2e_duckdb.duckdb
      HEALTH_API_KEY: ci-fake-health-api-key
      FQ_CRM_PASSWORDS: admin:123456
      ETL_MIN_DISK_GB: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-vue3/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Python deps (certifi for NODE_EXTRA_CA_CERTS)
        run: pip install certifi
      - name: Install Node deps
        run: |
          cd frontend-vue3
          # openapi-typescript@7.13.0 peer dep typescript@^5.x, 但 frontend devDeps typescript@~6.0.2 (新版).
          # Sprint 41 实战: npm ci 报 ERESOLVE → e2e job fail. 用 --legacy-peer-deps 跳过.
          npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        env:
          # Sprint 32.1 实战: macOS 跑 e2e 报 SELF_SIGNED_CERT_IN_CHAIN, 修法
          NODE_EXTRA_CA_CERTS: $(python3 -c "import certifi; print(certifi.where())")
        run: |
          cd frontend-vue3
          npx playwright install --with-deps chromium
      - name: Build (Vite) + Start preview server + Start uvicorn backend
        env:
          NODE_EXTRA_CA_CERTS: $(python3 -c "import certifi; print(certifi.where())")
        run: |
          cd frontend-vue3
          # Build + start preview server, wait for ready
          npm run build
          npx vite preview --port 5173 --host 0.0.0.0 &
          PREVIEW_PID=$!
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 | grep -q 200; then
              echo "✅ Preview server ready"
              break
            fi
            sleep 1
          done
          # Sprint 41.11 fix: uvicorn 启动错误被 '|| true' 吞, 改 set +e + 显式 error. 让 GH Actions log 看到 uvicorn 真实状态.
          cd ..
          # Sprint 41.11: 显式 set -e 让 pip install 失败时 e2e step fail (避免 '|| true' 吞错)
          set -e
          pip install -r requirements-lock.txt
          # Sprint 60.3+ C+: 初始化 schema-only DB，让 smoke e2e 不依赖 production DuckDB
          python3 - <<'PY'
          import duckdb
          conn = duckdb.connect('/tmp/e2e_duckdb.duckdb')
          with open('scripts/ci/e2e_schema.sql') as f:
              conn.execute(f.read())
          conn.execute('SELECT 1').fetchone()
          conn.close()
          PY
          # Sprint 41.11: uvicorn 不写 /tmp/, redirect 到 GH Actions log (>&1). 启动错误可见.
          # Sprint 55 fix: 加 HEALTH_API_KEY (Sprint 53.5 CI 爆根因 - uvicorn 启动 RuntimeError "HEALTH_API_KEY 未设置").
          HEALTH_API_KEY="ci-fake-health-api-key-$(date +%s)-$$" \
            FQ_CRM_PASSWORDS="admin:123456" \
            ETL_MIN_DISK_GB=0 \
            python3 -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          UVICORN_PID=$!
          # Sprint 41.11: 等 uvicorn 60s (CI runner 慢, 之前 30s 不够)
          UVICORN_READY=false
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health 2>/dev/null | grep -q 200; then
              echo "✅ Uvicorn backend ready (PID $UVICORN_PID)"
              UVICORN_READY=true
              break
            fi
            sleep 1
          done
          if [ "$UVICORN_READY" != "true" ]; then
            echo "❌ Uvicorn backend failed to start in 60s"
            exit 1
          fi
          # Sprint 41.11: set -e 关闭 (后续 playwright 不要 'fail-fast', 让 spec 跑完)
          set +e
      - name: Run e2e (10/10 view smoke expected)
        env:
          NODE_EXTRA_CA_CERTS: $(python3 -c "import certifi; print(certifi.where())")
        run: |
          cd frontend-vue3
          npx playwright test --reporter=list