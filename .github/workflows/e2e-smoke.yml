name: E2E Smoke (optional)

# 2026-07-19 门禁分层:
# - PR/main 默认 CI (lint.yml) 不再跑浏览器 e2e → 可合并 = lint + test
# - 本 workflow 仅 workflow_dispatch + 工作日 nightly，失败不挡 PR merge
# - 极简: requirements-e2e.txt（非 requirements-lock）+ 仅 login 壳层 smoke

on:
  schedule:
    # 工作日 UTC 14:00 ≈ 北京 22:00（nightly pytest 之后）
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DUCKDB_PATH: /tmp/e2e_duckdb.duckdb
      HEALTH_API_KEY: ci-fake-health-api-key
      FQ_CRM_PASSWORDS: admin:123456
      FQ_CRM_ADMINS: admin
      ETL_MIN_DISK_GB: '0'
      FQ_DB_MODE: schema_test
      FQ_CRM_TEST_MODE: '1'
      FQ_SINGLE_USER_V2: '0'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend-vue3/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: requirements-e2e.txt

      - name: Install Python deps (minimal e2e set, no ML lock)
        run: pip install -r requirements-e2e.txt

      - name: Install Node deps
        run: |
          cd frontend-vue3
          npm ci --legacy-peer-deps

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('frontend-vue3/package-lock.json') }}

      - name: Install Playwright browsers
        run: |
          cd frontend-vue3
          npx playwright install --with-deps chromium

      - name: Setup e2e DuckDB schema + seed
        run: python3 scripts/ci/seed_e2e_duckdb.py /tmp/e2e_duckdb.duckdb

      - name: Build (Vite) + Start preview + uvicorn
        run: |
          set -euo pipefail
          cd frontend-vue3
          npm run build
          npx vite preview --port 5173 --host 0.0.0.0 &
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 | grep -q 200; then
              echo "Preview server ready"
              break
            fi
            sleep 1
          done
          cd ..
          python3 -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          UVICORN_READY=false
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health 2>/dev/null | grep -q 200; then
              echo "Uvicorn backend ready"
              UVICORN_READY=true
              break
            fi
            sleep 1
          done
          if [ "$UVICORN_READY" != "true" ]; then
            echo "Uvicorn backend failed to start in 60s"
            exit 1
          fi

      - name: Run shell smoke (login only)
        working-directory: frontend-vue3
        run: |
          export NODE_EXTRA_CA_CERTS="$(python3 -c 'import certifi; print(certifi.where())')"
          # 仅壳层: login 路由 smoke。全量业务 spec 留本地/生产验收，不进默认 CI 门禁。
          npx playwright test e2e/login.spec.ts --reporter=list
