name: e2e

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'frontend-vue3/src/**'
      - 'frontend-vue3/e2e/**'
      - 'frontend-vue3/playwright.config.ts'
      - 'requirements.txt'
      - 'requirements-lock.txt'
      - 'pyproject.toml'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'frontend-vue3/src/**'
      - 'frontend-vue3/e2e/**'
      - 'frontend-vue3/playwright.config.ts'
      - 'requirements.txt'
      - 'requirements-lock.txt'
      - 'pyproject.toml'
      - '.github/workflows/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      DUCKDB_PATH: /tmp/e2e_duckdb.duckdb
      HEALTH_API_KEY: ci-fake-health-api-key
      FQ_CRM_PASSWORDS: admin:123456
      ETL_MIN_DISK_GB: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-vue3/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python deps
        run: |
          pip install duckdb certifi
          pip install -r requirements-lock.txt

      - name: Install Node deps
        run: |
          cd frontend-vue3
          npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: |
          cd frontend-vue3
          npx playwright install --with-deps chromium

      - name: Setup DuckDB ATTACH (Sprint 58 #1)
        run: |
          python3 - <<'PY'
          import duckdb

          conn = duckdb.connect('/tmp/e2e_duckdb.duckdb')
          conn.execute("ATTACH 'data/processed/fuqing_crm.duckdb' AS prod (READ_ONLY)")
          conn.execute("PRAGMA search_path='main,prod'")
          conn.execute('SELECT 1').fetchone()
          conn.close()
          PY

      - name: Build (Vite) + Start preview server + Start uvicorn backend
        run: |
          cd frontend-vue3
          npm run build
          npx vite preview --port 5173 --host 0.0.0.0 &
          PREVIEW_PID=$!
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 | grep -q 200; then
              echo "✅ Preview server ready"
              break
            fi
            sleep 1
          done
          cd ..
          set -e
          python3 -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          UVICORN_PID=$!
          UVICORN_READY=false
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health 2>/dev/null | grep -q 200; then
              echo "✅ Uvicorn backend ready (PID $UVICORN_PID)"
              UVICORN_READY=true
              break
            fi
            sleep 1
          done
          if [ "$UVICORN_READY" != "true" ]; then
            echo "❌ Uvicorn backend failed to start in 60s"
            exit 1
          fi
          set +e

      - name: Run e2e with auto-recovery (Sprint 58 #4 wrapper)
        run: |
          export NODE_EXTRA_CA_CERTS="$(python3 -c 'import certifi; print(certifi.where())')"
          chmod +x scripts/ci/auto_recover_ci.sh
          bash scripts/ci/auto_recover_ci.sh npx playwright test --reporter=list

      - name: Upload auto-recovery log on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: ci-auto-recovery-log
          path: /tmp/auto_recover_ci.log

