name: e2e

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'frontend-vue3/src/**'
      - 'frontend-vue3/e2e/**'
      - 'frontend-vue3/playwright.config.ts'
      - 'requirements.txt'
      - 'requirements-lock.txt'
      - 'pyproject.toml'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'frontend-vue3/src/**'
      - 'frontend-vue3/e2e/**'
      - 'frontend-vue3/playwright.config.ts'
      - 'requirements.txt'
      - 'requirements-lock.txt'
      - 'pyproject.toml'
      - '.github/workflows/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      DUCKDB_PATH: /tmp/e2e_duckdb.duckdb
      HEALTH_API_KEY: ci-fake-health-api-key
      FQ_CRM_PASSWORDS: admin:123456
      ETL_MIN_DISK_GB: '0'
      # Sprint 63: CI 空 schema DB 不抛 fail-fast, 走 WARN only
      # Sprint 61 P2 fail-fast 默认 production raise, e2e schema-only fixture 没 orders 数据
      # → 必须 FQ_DB_MODE=schema_test 走 warn 路径 (跟 CI runner 设计一致)
      FQ_DB_MODE: schema_test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-vue3/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Python deps
        run: |
          pip install duckdb certifi
          pip install -r requirements-lock.txt

      - name: Install Node deps
        run: |
          cd frontend-vue3
          npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: |
          cd frontend-vue3
          npx playwright install --with-deps chromium

      - name: Setup e2e DuckDB schema-only fixture (Sprint 60.3+ C+)
        run: |
          python3 - <<'PY'
          import duckdb

          conn = duckdb.connect('/tmp/e2e_duckdb.duckdb')
          with open('scripts/ci/e2e_schema.sql') as f:
              conn.execute(f.read())
          conn.execute('SELECT 1').fetchone()
          conn.close()
          PY

      - name: Build (Vite) + Start preview server + Start uvicorn backend
        run: |
          cd frontend-vue3
          npm run build
          npx vite preview --port 5173 --host 0.0.0.0 &
          PREVIEW_PID=$!
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 | grep -q 200; then
              echo "✅ Preview server ready"
              break
            fi
            sleep 1
          done
          cd ..
          set -e
          python3 -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          UVICORN_PID=$!
          UVICORN_READY=false
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health 2>/dev/null | grep -q 200; then
              echo "✅ Uvicorn backend ready (PID $UVICORN_PID)"
              UVICORN_READY=true
              break
            fi
            sleep 1
          done
          if [ "$UVICORN_READY" != "true" ]; then
            echo "❌ Uvicorn backend failed to start in 60s"
            exit 1
          fi
          set +e

      - name: Run e2e with auto-recovery (Sprint 58 #4 wrapper)
        working-directory: frontend-vue3
        run: |
          export NODE_EXTRA_CA_CERTS="$(python3 -c 'import certifi; print(certifi.where())')"
          chmod +x ../scripts/ci/auto_recover_ci.sh
          bash ../scripts/ci/auto_recover_ci.sh npx playwright test --reporter=list

      - name: Upload auto-recovery log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: ci-auto-recovery-log
          path: /tmp/auto_recover_ci.log

