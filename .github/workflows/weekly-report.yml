name: Weekly Health Report

# B6 P3: 每周定时跑全量 pytest, 写 artifact + step summary, 趋势可见 (FOLLOWUPS.md §B6)
# 收益: 回归早 1 周发现, artifact 90 天保留可下载
# 验收: GitHub repo → Actions → Weekly Health Report → 任意一次 run → Artifacts → pytest-results 下载

on:
  schedule:
    # 每周一 UTC 1:00 = 北京时间 9:00 (周一上午对账, 跟 FOLLOWUPS.md §B6 描述一致)
    - cron: '0 1 * * 1'
  workflow_dispatch:  # 允许手动触发 (测试 + 应急验证)

jobs:
  test:
    runs-on: ubuntu-latest
    # 与 lint.yml / nightly 对齐；PR test 实测 ~28min，留足装依赖余量
    timeout-minutes: 45
    env:
      FQ_CRM_PASSWORDS: admin:123456
      FQ_CRM_ADMINS: admin

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: requirements-lock.txt

      - name: Install dependencies (lock 锁版本, v0.4.7.7 B4)
        run: pip install -r requirements-lock.txt

      - name: B2 import completeness check (根因预防复检)
        run: python3 .githooks/check_imports.py

      - name: Run ruff
        # 与 lint.yml / nightly 一致：只扫 backend/，避免 scripts/_archive 假失败
        run: ruff check backend/

      - name: Run full pytest (C-class deselect SSOT + not slow, junit XML)
        # 2026-07-21: 与 PR/nightly 口径对齐，避免 weekly 独跑 slow/C-class 假红且无 junit
        run: |
          set -euo pipefail
          DESELECT_ARGS=()
          while IFS= read -r tok; do
            [ -n "$tok" ] && DESELECT_ARGS+=("$tok")
          done < <(bash scripts/ci/pytest_deselect_args.sh)
          echo "C-class deselect count: $((${#DESELECT_ARGS[@]} / 2))"
          PYTHONPATH=. pytest backend/tests/ --junitxml=pytest-results.xml -q -m "not slow" "${DESELECT_ARGS[@]}"

      - name: Upload pytest results artifact (90 天保留)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pytest-results
          path: pytest-results.xml
          retention-days: 90

      - name: Write summary to step
        if: always()
        run: |
          {
            echo "## Weekly pytest report"
            if [ -f pytest-results.xml ]; then
              python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('pytest-results.xml')
          root = tree.getroot()
          print(f'tests={root.get(\"tests\")} failures={root.get(\"failures\")} errors={root.get(\"errors\")} skipped={root.get(\"skipped\")} time={root.get(\"time\")}s')
          "
            else
              echo "tests=N/A (pytest-results.xml not generated)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
