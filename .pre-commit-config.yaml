repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
  - repo: local
    hooks:
      - id: contract-ground-truth-lint
        name: Contract Pydantic Field metadata lint (Sprint 17 #121, Sprint 18 #142)
        entry: python -m backend.contracts._lint
        language: system
        pass_filenames: false
        files: 'backend/contracts/.*\.py$'
        stages: [pre-commit]
